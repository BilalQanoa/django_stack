{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Great Number Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card leaderboard-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h2 mb-0">🏆 Leaderboard</h1>
                        <a href="/" class="btn btn-primary">Back to Game</a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th width="10%">Rank</th>
                                    <th>Name</th>
                                    <th width="20%">Attempts</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for score in leaderboard %}
                                <tr>
                                    <td><span class="badge rounded-pill bg-warning text-dark">{{ forloop.counter }}</span>
                                    </td>
                                    <td class="fw-bold">{{ score.name }}</td>
                                    <td><span class="badge bg-info text-dark">{{ score.attempts }} tries</span></td>
                                </tr>
                                {% endfor %}

                                {% if not leaderboard %}
                                <tr>
                                    <td colspan="3" class="text-center py-4 text-muted">No winners yet. Be the first!
                                    </td>
                                </tr>
                                {% endif %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
